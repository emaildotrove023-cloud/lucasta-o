<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>Lucastaço Memory Game ⚽</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap');

        body {
            margin: 0;
            padding: 10px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(-45deg, #050505, #0d1a0d, #121212, #071a07);
            background-size: 400% 400%;
            animation: moveGradient 12s ease infinite;
            color: #ffffff;
        }

        @keyframes moveGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .nav-top { width: 100%; max-width: 600px; margin: 10px 0; }
        .btn-back {
            text-decoration: none;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.7rem;
            font-weight: 700;
            padding: 8px 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.3s;
        }

        h1 { font-size: 1.2rem; color: #28a745; letter-spacing: 3px; margin: 10px 0; }

        .score-board { display: flex; gap: 20px; margin-bottom: 15px; font-size: 0.8rem; }
        .highlight { color: #28a745; font-weight: bold; }

        .game-container {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
            width: 100%;
            max-width: 600px;
            perspective: 1000px;
        }

        .card {
            height: 90px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s;
            cursor: pointer;
        }

        .card.flip { transform: rotateY(180deg); }

        .card-front, .card-back {
            width: 100%;
            height: 100%;
            position: absolute;
            backface-visibility: hidden;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .card-front {
            transform: rotateY(180deg);
            background: #1a1a1a;
        }

        .card-front img { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; }

        .card-back {
            background: #222;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .btn-restart {
            margin-top: 20px;
            background: transparent;
            color: #28a745;
            padding: 10px 25px;
            border: 2px solid #28a745;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
        }

        @media (max-width: 500px) {
            .game-container { grid-template-columns: repeat(4, 1fr); }
            .card { height: 75px; }
        }
    </style>
</head>
<body>

    <nav class="nav-top">
        <a href="index.html" class="btn-back">← Voltar</a>
    </nav>

    <h1>LUCASTAÇO MEMORY</h1>
    
    <div class="score-board">
        <div>Tentativas: <span id="moves" class="highlight">0</span></div>
        <div>Pares: <span id="matches" class="highlight">0</span> / 12</div>
    </div>

    <div class="game-container" id="game-board"></div>

    <button class="btn-restart" onclick="initGame()">Reiniciar Jogo 🔄</button>

    <script>
        const allImages = [
            "https://i.imgur.com/qB3Ly5S.jpg", "https://i.imgur.com/wzJmyi2.jpg", "https://i.imgur.com/4yMMkqz.jpg",
            "https://i.imgur.com/CxSIb1c.jpg", "https://i.imgur.com/6zs7zPa.jpg", "https://i.imgur.com/vPk9ToX.jpg",
            "https://i.imgur.com/R3x4Hy5.jpg", "https://i.imgur.com/wuzoEvd.jpg", "https://i.imgur.com/18qkEtz.jpg",
            "https://i.imgur.com/7p7gGKj.jpg", "https://i.imgur.com/EtIlkF4.jpg", "https://i.imgur.com/fDIdYdK.jpg"
        ];

        let moves = 0;
        let matchesCount = 0;
        let firstCard, secondCard;
        let lockBoard = false;
        const totalPairs = 12; // Reduzi para 12 pares para caber melhor em telas pequenas

        function initGame() {
            moves = 0;
            matchesCount = 0;
            document.getElementById('moves').innerText = moves;
            document.getElementById('matches').innerText = matchesCount;
            const board = document.getElementById('game-board');
            board.innerHTML = '';
            
            // Embaralhar e duplicar
            const gameImages = [...allImages.slice(0, totalPairs), ...allImages.slice(0, totalPairs)];
            gameImages.sort(() => Math.random() - 0.5);

            gameImages.forEach(imgUrl => {
                const card = document.createElement('div');
                card.classList.add('card');
                card.dataset.id = imgUrl;
                card.innerHTML = `
                    <div class="card-front"><img src="${imgUrl}"></div>
                    <div class="card-back">⚽</div>
                `;
                card.addEventListener('click', flipCard);
                board.appendChild(card);
            });
        }

        function flipCard() {
            if (lockBoard) return;
            if (this === firstCard) return;

            this.classList.add('flip');

            if (!firstCard) {
                firstCard = this;
                return;
            }

            secondCard = this;
            moves++;
            document.getElementById('moves').innerText = moves;
            checkMatch();
        }

        function checkMatch() {
            let isMatch = firstCard.dataset.id === secondCard.dataset.id;
            isMatch ? disableCards() : unflipCards();
        }

        function disableCards() {
            matchesCount++;
            document.getElementById('matches').innerText = matchesCount;
            firstCard.removeEventListener('click', flipCard);
            secondCard.removeEventListener('click', flipCard);
            resetBoard();
            if(matchesCount === totalPairs) alert("Parabéns! Você completou o desafio Lucastaço!");
        }

        function unflipCards() {
            lockBoard = true;
            setTimeout(() => {
                firstCard.classList.remove('flip');
                secondCard.classList.remove('flip');
                resetBoard();
            }, 1000);
        }

        function resetBoard() {
            [firstCard, secondCard] = [null, null];
            lockBoard = false;
        }

        // Inicia automaticamente
        window.onload = initGame;
    </script>
</body>
</html>
