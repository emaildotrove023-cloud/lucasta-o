<!DOCTYPE html>
<html lang="pt-br">
<head><!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>Lucastaço Memory Game ⚽</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap');

        /* --- FUNDO ANIMADO PREMIUM (CORRIGIDO E FUNCIONAL) --- */
        body {
            margin: 0;
            padding: 10px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            font-family: 'Inter', sans-serif;
            /* Definição do Gradiente */
            background: linear-gradient(-45deg, #050505, #1a3a1a, #0a0a0a, #051a05);
            background-size: 400% 400%;
            /* Ativação da Animação */
            animation: moveGradient 15s ease infinite;
            color: #ffffff;
            overflow-x: hidden;
        }

        /* Definição dos Movimentos do Gradiente */
        @keyframes moveGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- CABEÇALHO E NAVEGAÇÃO --- */
        .nav-top { width: 100%; max-width: 600px; margin: 10px 0; display: flex; justify-content: flex-start; }
        .btn-back {
            text-decoration: none;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.7rem;
            font-weight: 700;
            padding: 8px 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            transition: 0.3s;
            text-transform: uppercase;
        }
        .btn-back:hover { background: rgba(40, 167, 69, 0.2); color: #28a745; border-color: #28a745; }

        h1 { font-size: 1.2rem; color: #28a745; letter-spacing: 3px; margin: 10px 0; text-transform: uppercase; text-shadow: 0 0 15px rgba(40, 167, 69, 0.4); }

        .score-board { display: flex; gap: 20px; margin-bottom: 15px; font-size: 0.8rem; text-transform: uppercase; color: rgba(255,255,255,0.6); }
        .highlight { color: #fff; font-weight: bold; }

        /* --- GRADE DO JOGO --- */
        .game-container {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
            width: 100%;
            max-width: 600px;
            margin-bottom: 20px;
        }

        /* --- CARTAS (LÓGICA DE VISIBILIDADE CORRIGIDA) --- */
        .card {
            height: 90px;
            position: relative;
            cursor: pointer;
            border-radius: 8px;
            transition: transform 0.2s ease;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            overflow: hidden;
        }

        .card:active { transform: scale(0.95); }

        /* Estado 'combinado' (par encontrado) */
        .card.match {
            opacity: 0.3;
            cursor: default;
            box-shadow: none;
            border-color: rgba(28, 167, 69, 0.2);
        }

        /* Frente (A imagem do Lucas) */
        .card-front {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0; left: 0;
            background: #1a1a1a;
            border-radius: 8px;
            /* Escondida por padrão */
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.4s ease, visibility 0.4s ease;
            z-index: 2;
        }

        .card-front img { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; }

        /* Verso (A bola de futebol) */
        .card-back {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0; left: 0;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(5px);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            color: #28a745;
            /* Visível por padrão */
            opacity: 1;
            visibility: visible;
            transition: opacity 0.4s ease, visibility 0.4s ease;
            z-index: 1;
        }

        /* LÓGICA DE VIRADA (FLIP) - CORRIGIDA --- */
        /* Quando a carta tem a classe .flip, a frente aparece e o verso some */
        .card.flip .card-front {
            opacity: 1;
            visibility: visible;
        }

        .card.flip .card-back {
            opacity: 0;
            visibility: hidden;
            /* Adiciona um pequeno atraso para garantir que a frente carregue */
            transition-delay: 0.1s; 
        }

        /* --- BOTÃO REINICIAR --- */
        .btn-restart {
            background: transparent;
            color: #28a745;
            padding: 12px 30px;
            border: 2px solid #28a745;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
        }
        .btn-restart:hover { background: #28a745; color: #fff; box-shadow: 0 0 20px rgba(40, 167, 69, 0.5); }

        /* --- RESPONSIVIDADE CELULAR --- */
        @media (max-width: 500px) {
            .game-container { grid-template-columns: repeat(4, 1fr); gap: 6px; }
            .card { height: 80px; }
            .card-back { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <nav class="nav-top">
        <a href="lucas.html" class="btn-back">← Voltar ao Portal</a>
    </nav>

    <h1>LUCASTAÇO MEMORY</h1>
    
    <div class="score-board">
        <div>Tentativas: <span id="moves" class="highlight">0</span></div>
        <div>Pares: <span id="matches" class="highlight">0</span> / 12</div>
    </div>

    <div class="game-container" id="game-board"></div>

    <button class="btn-restart" onclick="initGame()">Reiniciar Jogo 🔄</button>

    <script>
        const allImages = [
            "https://i.imgur.com/qB3Ly5S.jpg", "https://i.imgur.com/wzJmyi2.jpg", "https://i.imgur.com/4yMMkqz.jpg",
            "https://i.imgur.com/CxSIb1c.jpg", "https://i.imgur.com/6zs7zPa.jpg", "https://i.imgur.com/vPk9ToX.jpg",
            "https://i.imgur.com/R3x4Hy5.jpg", "https://i.imgur.com/wuzoEvd.jpg", "https://i.imgur.com/18qkEtz.jpg",
            "https://i.imgur.com/7p7gGKj.jpg", "https://i.imgur.com/EtIlkF4.jpg", "https://i.imgur.com/fDIdYdK.jpg"
        ];

        let moves = 0;
        let matchesCount = 0;
        let firstCard, secondCard;
        let lockBoard = false;
        const totalPairs = 12;

        function initGame() {
            moves = 0;
            matchesCount = 0;
            document.getElementById('moves').innerText = moves;
            document.getElementById('matches').innerText = matchesCount;
            const board = document.getElementById('game-board');
            board.innerHTML = '';
            
            // Embaralhar e duplicar
            const gameImages = [...allImages.slice(0, totalPairs), ...allImages.slice(0, totalPairs)];
            gameImages.sort(() => Math.random() - 0.5);

            gameImages.forEach(imgUrl => {
                const card = document.createElement('div');
                card.classList.add('card');
                card.dataset.id = imgUrl;
                // Estrutura HTML simplificada para a nova lógica de visibilidade
                card.innerHTML = `
                    <div class="card-front"><img src="${imgUrl}" alt="Lucas"></div>
                    <div class="card-back">⚽</div>
                `;
                card.addEventListener('click', flipCard);
                board.appendChild(card);
            });
        }

        function flipCard() {
            if (lockBoard) return;
            if (this === firstCard) return;

            this.classList.add('flip'); // Adiciona a classe que engatilha o CSS

            if (!firstCard) {
                firstCard = this;
                return;
            }

            secondCard = this;
            moves++;
            document.getElementById('moves').innerText = moves;
            checkMatch();
        }

        function checkMatch() {
            let isMatch = firstCard.dataset.id === secondCard.dataset.id;
            isMatch ? disableCards() : unflipCards();
        }

        function disableCards() {
            matchesCount++;
            document.getElementById('matches').innerText = matchesCount;
            firstCard.removeEventListener('click', flipCard);
            secondCard.removeEventListener('click', flipCard);
            
            // Adiciona classe de 'combinado' para feedback visual
            firstCard.classList.add('match');
            secondCard.classList.add('match');

            resetBoard();
            if(matchesCount === totalPairs) {
                setTimeout(() => alert("FENOMENAL! Você completou o desafio Lucastaço! 🏆"), 500);
            }
        }

        function unflipCards() {
            lockBoard = true;
            setTimeout(() => {
                firstCard.classList.remove('flip');
                secondCard.classList.remove('flip');
                resetBoard();
            }, 1100); // Tempo que as cartas ficam expostas
        }

        function resetBoard() {
            [firstCard, secondCard] = [null, null];
            lockBoard = false;
        }

        // Inicia automaticamente
        window.onload = initGame;
    </script>
</body>
</html>
