<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucastaço Memory Game ⚽</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap');

        /* --- FUNDO ANIMADO PREMIUM --- */
        body {
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(-45deg, #050505, #0d1a0d, #121212, #071a07);
            background-size: 400% 400%;
            animation: moveGradient 12s ease infinite;
            color: #ffffff;
            overflow-x: hidden;
        }

        @keyframes moveGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- BARRA DE NAVEGAÇÃO VOLTAR --- */
        .nav-top {
            width: 100%;
            max-width: 640px;
            display: flex;
            justify-content: flex-start;
            margin-bottom: 20px;
            z-index: 100;
        }

        .btn-back {
            text-decoration: none;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            transition: 0.3s;
        }

        .btn-back:hover {
            background: rgba(40, 167, 69, 0.2);
            color: #28a745;
            border-color: #28a745;
        }

        /* --- CABEÇALHO E PLACAR --- */
        header {
            text-align: center;
            margin-bottom: 20px;
            z-index: 10;
        }

        h1 {
            font-size: 1rem;
            letter-spacing: 5px;
            color: #28a745;
            margin-bottom: 10px;
            font-weight: 700;
            text-transform: uppercase;
            text-shadow: 0 0 15px rgba(40, 167, 69, 0.4);
        }

        .score-board {
            display: flex;
            gap: 20px;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.7);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .highlight { color: #fff; font-weight: 700; }

        /* --- CONTAINER DO JOGO (GRADE) --- */
        .game-container {
            width: 100%;
            max-width: 640px;
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 10px;
            perspective: 1000px;
            margin-bottom: 30px;
        }

        /* --- CARTAS E ANIMAÇÃO DE FLIP --- */
        .card {
            background-color: transparent;
            height: 100px;
            cursor: pointer;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 12px;
        }

        .card.flip { transform: rotateY(180deg); cursor: default; }

        .card.match {
            transform: rotateY(180deg) scale(0.95);
            opacity: 0.4;
            cursor: default;
        }

        /* Ajuste das Faces */
        .card-front, .card-back {
            width: 100%;
            height: 100%;
            position: absolute;
            border-radius: 12px;
            backface-visibility: hidden; /* IMPORTANTE: Esconde a face de trás */
            -webkit-backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }

        /* Frente (A imagem do Lucas) */
        .card-front {
            background-color: #1a1a1a;
            transform: rotateY(180deg); /* Já começa invertida fisicamente */
            z-index: 2;
        }

        .card-front img { width: 100%; height: 100%; object-fit: cover; }

        /* Verso (A bola de futebol) */
        .card-back {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(5px);
            color: #28a745;
            font-size: 2rem;
            z-index: 1;
        }

        .btn-restart {
            background: transparent;
            color: #28a745;
            padding: 12px 30px;
            border: 2px solid #28a745;
            border-radius: 100px;
            font-weight: 700;
            cursor: pointer;
            font-size: 12px;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            z-index: 10;
        }

        .btn-restart:hover {
            background: #28a745;
            color: #fff;
            box-shadow: 0 0 20px rgba(40, 167, 69, 0.5);
        }

        @media (max-width: 500px) {
            .game-container { grid-template-columns: repeat(4, 1fr); gap: 8px; }
            .card { height: 85px; }
        }
    </style>
</head>
<body>

    <nav class="nav-top">
        <a href="lucas.html" class="btn-back">← Voltar ao Portal</a>
    </nav>

    <header>
        <h1>LUCASTAÇO MEMORY</h1>
        <div class="score-board">
            <div>Tentativas: <span id="moves" class="highlight">0</span></div>
            <div>Pares: <span id="matches" class="highlight">0</span> / 18</div>
        </div>
    </header>

    <main class="game-container" id="game-board"></main>

    <button class="btn-restart" onclick="initGame()">Reiniciar Jogo 🔄</button>

    <script>
        const allImages = [
            "https://i.imgur.com/qB3Ly5S.jpg", "https://i.imgur.com/wzJmyi2.jpg", "https://i.imgur.com/4yMMkqz.jpg",
            "https://i.imgur.com/CxSIb1c.jpg", "https://i.imgur.com/6zs7zPa.jpg", "https://i.imgur.com/vPk9ToX.jpg",
            "https://i.imgur.com/R3x4Hy5.jpg", "https://i.imgur.com/wuzoEvd.jpg", "https://i.imgur.com/18qkEtz.jpg",
            "https://i.imgur.com/7p7gGKj.jpg", "https://i.imgur.com/EtIlkF4.jpg",
            "https://i.imgur.com/fDIdYdK.jpg", "https://i.imgur.com/nI7S3cm.jpg",
            "https://i.imgur.com/ALZlQk6.jpg", "https://i.imgur.com/nKLsZP0.jpg",
            "https://i.imgur.com/RzfYcCD.jpg", "https://i.imgur.com/bmRtMUH.jpg",
            "https://i.imgur.com/OxrGM7M.jpg", "https://i.imgur.com/Q8Mwplc.jpg",
            "https://i.imgur.com/ix7g5HW.jpg", "https://i.imgur.com/Qgh6mQa.jpg",
            "https://i.imgur.com/Fc6DCfc.jpg", "https://i.imgur.com/6bWNf3S.jpg",
            "https://i.imgur.com/8qsxIpq.jpg", "https://i.imgur.com/9uylBMQ.jpg",
            "https://i.imgur.com/YtzG6dF.jpg", "https://i.imgur.com/myYLeVE.jpg",
            "https://i.imgur.com/MjwDn5R.jpg", "https://i.imgur.com/shCboG4.jpg"
        ];

        const gameBoard = document.getElementById('game-board');
        const movesEl = document.getElementById('moves');
        const matchesEl = document.getElementById('matches');

        let hasFlippedCard = false;
        let lockBoard = false;
        let firstCard, secondCard;
        let moves = 0;
        let matchesCount = 0;
        const totalPairs = 18;

        function selectAndShuffleImages() {
            let shuffled = [...allImages].sort(() => 0.5 - Math.random());
            let selected = shuffled.slice(0, totalPairs);
            let gameSet = [...selected, ...selected];
            return gameSet.sort(() => 0.5 - Math.random());
        }

        function createBoard() {
            gameBoard.innerHTML = '';
            const imageSet = selectAndShuffleImages();

            imageSet.forEach(imgUrl => {
                const card = document.createElement('div');
                card.classList.add('card');
                card.dataset.id = imgUrl;

                // A frente agora tem z-index maior no CSS para aparecer no topo após o flip
                const front = document.createElement('div');
                front.classList.add('card-front');
                const img = document.createElement('img');
                img.src = imgUrl;
                front.appendChild(img);

                const back = document.createElement('div');
                back.classList.add('card-back');
                back.innerText = '⚽';

                card.appendChild(front);
                card.appendChild(back);
                card.addEventListener('click', flipCard);
                gameBoard.appendChild(card);
            });
        }

        function flipCard() {
            if (lockBoard) return;
            if (this === firstCard) return;

            this.classList.add('flip');

            if (!hasFlippedCard) {
                hasFlippedCard = true;
                firstCard = this;
                return;
            }

            secondCard = this;
            incrementMoves();
            checkForMatch();
        }

        function checkForMatch() {
            let isMatch = firstCard.dataset.id === secondCard.dataset.id;
            isMatch ? disableCards() : unflipCards();
        }

        function disableCards() {
            firstCard.classList.add('match');
            secondCard.classList.add('match');
            firstCard.removeEventListener('click', flipCard);
            secondCard.removeEventListener('click', flipCard);
            incrementMatches();
            resetBoardVars();
        }

        function unflipCards() {
            lockBoard = true;
            setTimeout(() => {
                firstCard.classList.remove('flip');
                secondCard.classList.remove('flip');
                resetBoardVars();
            }, 1000);
        }

        function resetBoardVars() {
            [hasFlippedCard, lockBoard] = [false, false];
            [firstCard, secondCard] = [null, null];
        }

        function incrementMoves() {
            moves++;
            movesEl.innerText = moves;
        }

        function incrementMatches() {
            matchesCount++;
            matchesEl.innerText = matchesCount;
            if (matchesCount === totalPairs) {
                setTimeout
