<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Lucastaço ⚽</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap');

        /* Fundo Animado Moderno */
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            /* Gradiente animado */
            background: linear-gradient(-45deg, #050505, #0d1a0d, #0a0a0a, #1a1a1a);
            background-size: 400% 400%;
            animation: moveGradient 15s ease infinite;
            color: #ffffff;
            overflow: hidden;
        }

        @keyframes moveGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Container Principal */
        .main-container {
            width: 90%;
            max-width: 420px;
            text-align: center;
            z-index: 10;
        }

        h1 {
            font-size: 0.8rem;
            letter-spacing: 6px;
            color: #28a745;
            margin-bottom: 25px;
            font-weight: 700;
            text-shadow: 0 0 20px rgba(40, 167, 69, 0.3);
        }

        /* Card da Foto com Vidro */
        .photo-card {
            position: relative;
            width: 100%;
            height: 520px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border-radius: 35px;
            margin-bottom: 35px;
            overflow: hidden;
            box-shadow: 0 40px 80px rgba(0,0,0,0.8);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        #display-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 1.2s cubic-bezier(0.23, 1, 0.32, 1), opacity 0.6s ease;
        }

        /* Overlay do Texto Motivacional */
        .quote-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 50px 30px;
            background: linear-gradient(transparent, rgba(0,0,0,0.95));
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #motivation-text {
            font-size: 1.05rem;
            font-weight: 400;
            line-height: 1.5;
            font-style: italic;
            color: rgba(255, 255, 255, 0.9);
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.7s ease;
        }

        /* Botão Minimalista Moderno */
        .btn-action {
            background: #28a745;
            color: #fff;
            padding: 18px 50px;
            border: none;
            border-radius: 100px;
            font-weight: 700;
            cursor: pointer;
            font-size: 13px;
            letter-spacing: 1.5px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 15px 35px rgba(40, 167, 69, 0.3);
            text-transform: uppercase;
        }

        .btn-action:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 20px 45px rgba(40, 167, 69, 0.5);
            background: #34ce57;
        }

        .btn-action:active { transform: translateY(0); }

        .counter {
            margin-top: 25px;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.25);
        }
    </style>
</head>
<body>

    <div class="main-container">
        <h1>LUCASTAÇO EXPLORER</h1>
        
        <div class="photo-card">
            <img id="display-img" src="" alt="Foco no objetivo">
            <div class="quote-overlay">
                <div id="motivation-text">Carregando inspiração...</div>
            </div>
        </div>

        <button class="btn-action" onclick="nextStep()">SORTEAR DESTINO 🎲</button>

        <div class="counter" id="img-counter">Progresso: 0/0</div>
    </div>
