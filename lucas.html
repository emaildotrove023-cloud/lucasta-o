<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Lucastaço ⚽</title>
    <style>
        /* Estilo Dark Moderno */
        body {
            margin: 0;
            background-color: #0a0a0a;
            color: #eee;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .main-container {
            width: 90%;
            max-width: 600px;
            background: #151515;
            padding: 30px;
            border-radius: 20px;
            border: 2px solid #28a745; /* Verde Sucesso */
            box-shadow: 0 15px 50px rgba(0,0,0,0.8);
            text-align: center;
        }

        h1 {
            margin-top: 0;
            color: #28a745;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 1.5rem;
        }

        /* Moldura da Foto */
        .photo-frame {
            width: 100%;
            height: 450px;
            background: #000;
            border-radius: 12px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 1px solid #333;
        }

        .photo-frame img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain; /* Garante que a foto não corte */
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        /* Botões de Navegação */
        .nav-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s ease;
            text-transform: uppercase;
        }

        .btn-nav { background: #333; color: white; }
        .btn-random { background: #28a745; color: white; }

        button:hover {
            transform: translateY(-3px);
            filter: brightness(1.2);
        }

        button:active { transform: translateY(0); }

        .counter {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #666;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <h1>LUCASTAÇO EXPLORER</h1>
        
        <div class="photo-frame">
            <img id="display-img" src="" alt="Carregando Lucastaço...">
        </div>

        <div class="nav-buttons">
            <button class="btn-nav" onclick="changeImage(-1)">⬅ Anterior</button>
            <button class="btn-random" onclick="randomImage()">🔀 Aleatório</button>
            <button class="btn-nav" onclick="changeImage(1)">Próximo ➡</button>
        </div>

        <div class="counter" id="img-counter">Carregando fotos...</div>
    </div>

    <script>
        // Seus links corrigidos (links diretos i.imgur.com)
        const lucasPhotos = [
            "https://i.imgur.com/fxCpC5S.jpg",
            "https://i.imgur.com/7Re8UoZ.jpg",
            "https://i.imgur.com/qB3Ly5S.jpg",
            "https://i.imgur.com/wzJmyi2.jpg",
            "https://i.imgur.com/CxSIb1c.jpg",
            "https://i.imgur.com/6zs7zPa.jpg",
            "https://i.imgur.com/R3x4Hy5.jpg",
            "https://i.imgur.com/wuzoEvd.jpg",
            "https://i.imgur.com/7p7gGKj.jpg",
            "https://i.imgur.com/EtIlkF4.jpg",
            "https://i.imgur.com/fDIdYdK.jpg",
            "https://i.imgur.com/nI7S3cm.jpg",
            "https://i.imgur.com/ALZlQk6.jpg"
        ];

        let currentIndex = 0;
        const imgElement = document.getElementById('display-img');
        const counterElement = document.getElementById('img-counter');

        // Função para atualizar a tela
        function updateDisplay() {
            // Efeito de fade simples
            imgElement.style.opacity = 0;
            
            setTimeout(() => {
                imgElement.src = lucasPhotos[currentIndex];
                counterElement.innerText = `Imagem ${currentIndex + 1} de ${lucasPhotos.length}`;
                imgElement.style.opacity = 1;
            }, 150);
        }

        // Navegação Sequencial
        function changeImage(step) {
            currentIndex += step;
            if (currentIndex >= lucasPhotos.length) currentIndex = 0;
            if (currentIndex < 0) currentIndex = lucasPhotos.length - 1;
            updateDisplay();
        }

        // Navegação Aleatória
        function randomImage() {
            let newIndex;
            do {
                newIndex = Math.floor(Math.random() * lucasPhotos.length);
            } while (newIndex === currentIndex); // Evita repetir a mesma foto no aleatório
            
            currentIndex = newIndex;
            updateDisplay();
        }

        // Inicia com a primeira foto
        updateDisplay();
    </script>

</body>
</html>
